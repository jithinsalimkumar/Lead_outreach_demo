# Alembic configuration file

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for migration filenames — includes a timestamp for ordering
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Don't truncate the revision display in logs
truncate_slug_length = 40

# Use 'true' to run in "offline" mode (generates SQL without executing)
prepend_sys_path = .

# The SQLAlchemy URL is set programmatically in env.py, not here
# sqlalchemy.url is intentionally left blank
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
