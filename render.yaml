# Render Blueprint Specification (render.yaml)
# Learn more: https://render.com/docs/blueprint-spec

services:
  # -------------------------------------------------------------
  # 1. FastAPI Backend Web Service (Docker)
  # -------------------------------------------------------------
  - type: web
    name: lead-outreach-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    region: oregon # Or your preferred region: frankfurt, singapore, ohio
    plan: free # Change to starter/standard for production
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lead-outreach-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lead-outreach-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "43405785a9757657ad5ef6f9d2c25327ecbcffebed8fce411b0e77d344ff1e01" # 32-byte hex key for Fernet
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: "http://localhost:3000"

  # -------------------------------------------------------------
  # 2. Next.js Frontend Web Service (Node)
  # -------------------------------------------------------------
  - type: web
    name: lead-outreach-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lead-outreach-backend
          property: url

  # -------------------------------------------------------------
  # 3. Redis Instance (Internal Cache & Queue)
  # -------------------------------------------------------------
  - type: redis
    name: lead-outreach-redis
    region: oregon
    plan: free
    ipAllowList: [] # Internal access only within Render

# ---------------------------------------------------------------
# 4. PostgreSQL Managed Database
# ---------------------------------------------------------------
databases:
  - name: lead-outreach-db
    databaseName: leadoutreach
    user: leadoutreach
    region: oregon
    plan: free
